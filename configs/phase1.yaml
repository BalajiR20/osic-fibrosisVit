  features:
    - "Weeks"
    - "WeekOffset"
    - "Age"
    - "Sex"
    - "SmokingStatus"
    - "FVC"
  target: "FVC"
  solver: "highs"
  alpha: 0.01

loss:
  sigma_min: 70.0
  delta_max: 1000.0
